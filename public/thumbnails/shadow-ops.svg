<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <rect width="400" height="225" fill="#0a0a0a"/>
  <!-- Grid lines -->
  <line x1="0" y1="50" x2="400" y2="50" stroke="#220000" stroke-width="0.5"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="#220000" stroke-width="0.5"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#220000" stroke-width="0.5"/>
  <line x1="100" y1="0" x2="100" y2="225" stroke="#220000" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="225" stroke="#220000" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="225" stroke="#220000" stroke-width="0.5"/>
  <!-- Crosshair -->
  <circle cx="200" cy="100" r="30" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="100" r="15" fill="none" stroke="#cc0000" stroke-width="0.5" opacity="0.4"/>
  <line x1="170" y1="100" x2="230" y2="100" stroke="#cc0000" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="70" x2="200" y2="130" stroke="#cc0000" stroke-width="0.5" opacity="0.5"/>
  <!-- Red accents -->
  <rect x="10" y="10" width="40" height="3" fill="#cc0000" opacity="0.6"/>
  <rect x="350" y="10" width="40" height="3" fill="#cc0000" opacity="0.6"/>
  <rect x="10" y="20" width="25" height="2" fill="#cc0000" opacity="0.3"/>
  <rect x="0" y="160" width="400" height="65" fill="#0a0000" opacity="0.6"/>
  <text x="200" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#cc2020" opacity="0.9" letter-spacing="6">SHADOW OPS</text>
</svg>