<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0010"/>
      <stop offset="100%" stop-color="#0a0008"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.3" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#4a1030" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0008" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <rect width="400" height="225" fill="url(#spot)"/>
  <!-- Venetian blind shadows -->
  <rect x="0" y="20" width="250" height="8" fill="#2a0a18" opacity="0.5" transform="skewX(-15)"/>
  <rect x="0" y="45" width="250" height="8" fill="#2a0a18" opacity="0.45" transform="skewX(-15)"/>
  <rect x="0" y="70" width="250" height="8" fill="#2a0a18" opacity="0.4" transform="skewX(-15)"/>
  <rect x="0" y="95" width="250" height="8" fill="#2a0a18" opacity="0.35" transform="skewX(-15)"/>
  <rect x="0" y="120" width="250" height="8" fill="#2a0a18" opacity="0.3" transform="skewX(-15)"/>
  <!-- Silhouette -->
  <ellipse cx="320" cy="130" rx="25" ry="35" fill="#0a0008" opacity="0.8"/>
  <rect x="305" y="130" width="30" height="60" fill="#0a0008" opacity="0.8"/>
  <rect x="0" y="160" width="400" height="65" fill="#0a0008" opacity="0.6"/>
  <text x="200" y="202" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="bold" fill="#8a3050" opacity="0.9" letter-spacing="5">VELVET NOIR</text>
</svg>